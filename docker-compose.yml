version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yipitdata-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database across container restarts
      - db_data:/app/data
      # Mount CSV data directory
      - ./data:/app/data:ro
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////app/data/kpi.db
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - yipitdata-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yipitdata-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - yipitdata-network

volumes:
  db_data:
    driver: local

networks:
  yipitdata-network:
    driver: bridge
