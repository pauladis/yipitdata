services:
  db:
    image: postgres:15-alpine
    container_name: yipitdata-db
    environment:
      POSTGRES_DB: yipitdata
      POSTGRES_USER: kpi_user
      POSTGRES_PASSWORD: kpi_password
    ports:
      - "5432:5432"
    volumes:
      - db_postgres:/var/lib/postgresql/data
    networks:
      - yipitdata-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kpi_user -d yipitdata"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yipitdata-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://kpi_user:kpi_password@db:5432/yipitdata
      - LOG_LEVEL=info
    depends_on:
      db:
        condition: service_healthy
    networks:
      - yipitdata-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yipitdata-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - yipitdata-network

volumes:
  db_postgres:
    driver: local

networks:
  yipitdata-network:
    driver: bridge
